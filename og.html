<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  :root{
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,monospace;
    --blue:#4f8df7;--blue-w:#dce8ff;--lav:#7c5cfc;--lav-w:#e7e0ff;
    --peach:#ff8a4c;--peach-w:#ffe6d6;--mint:#2fb56f;--mint-w:#ddf3e4;--pink:#ff5a8a;
    --ink:#111114;--sec:#8a8a8e;
  }
  body{
    font-family:var(--font);
    background:
      radial-gradient(900px 500px at 12% 8%, rgba(255,255,255,.20), transparent 60%),
      radial-gradient(700px 600px at 100% 100%, rgba(52,20,120,.45), transparent 60%),
      linear-gradient(140deg,#8f6dff 0%,#7250f4 48%,#5f42e6 100%);
    position:relative;
    display:flex;align-items:center;
    padding:70px 74px;
    color:#fff;
  }
  /* faint decorative rings */
  .ring{position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,.09)}
  .r1{width:520px;height:520px;top:-190px;left:-140px}
  .r2{width:360px;height:360px;bottom:-160px;left:120px;border-color:rgba(255,255,255,.07)}

  .left{width:660px;flex:none;position:relative;z-index:2}
  .lockup{display:flex;align-items:center;gap:20px;margin-bottom:34px}
  .tile{width:92px;height:92px;border-radius:24px;background:#fff;position:relative;
    box-shadow:0 18px 40px -14px rgba(30,10,80,.55)}
  .tile svg{position:absolute;inset:0;margin:auto;width:60px;height:60px}
  .word{font-size:52px;font-weight:750;letter-spacing:-.03em}

  .eyebrow{font-family:var(--mono);font-size:19px;letter-spacing:.22em;text-transform:uppercase;
    color:rgba(255,255,255,.82);font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:14px}
  .eyebrow::before{content:"";width:34px;height:2px;background:rgba(255,255,255,.7);border-radius:2px}
  h1{font-size:62px;line-height:1.03;font-weight:730;letter-spacing:-.032em;max-width:640px}
  h1 span{color:#fff;background:linear-gradient(180deg,#fff,#efe9ff);-webkit-background-clip:text;background-clip:text}
  .em{font-style:normal;position:relative;white-space:nowrap}
  .em::after{content:"";position:absolute;left:0;right:0;bottom:6px;height:14px;background:rgba(255,255,255,.22);border-radius:6px;z-index:-1}
  .badge{margin-top:36px;display:inline-flex;align-items:center;gap:12px;background:#111114;color:#fff;
    padding:15px 24px;border-radius:16px;font-size:20px;font-weight:560;box-shadow:0 16px 34px -14px rgba(0,0,0,.5)}
  .badge small{display:block;font-size:12px;opacity:.6;line-height:1;margin-bottom:3px;font-weight:500}
  .badge b{font-size:22px;font-weight:640}

  /* right: app card */
  .right{flex:1;display:flex;justify-content:center;align-items:center;position:relative;z-index:2}
  .card{width:380px;background:#fff;border-radius:34px;padding:26px 24px;color:var(--ink);
    box-shadow:0 50px 90px -30px rgba(20,8,60,.6),0 20px 40px -20px rgba(20,8,60,.5);
    transform:rotate(3deg)}
  .ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .cmonth{font-size:30px;font-weight:730;letter-spacing:-.02em}
  .cmonth em{color:var(--sec);font-weight:600;font-style:normal}
  .cava{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--lav),var(--pink));
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px}
  .today{font-size:14px;font-weight:700;color:#5b3fe0;letter-spacing:.03em;margin:16px 0 14px}
  .ev{display:flex;gap:13px;padding:14px;border-radius:17px;margin-bottom:11px;align-items:center}
  .ev .bar{width:4px;align-self:stretch;border-radius:3px}
  .ev .t{font-size:17px;font-weight:640;letter-spacing:-.01em}
  .ev .m{font-family:var(--mono);font-size:12.5px;color:var(--sec);margin-top:4px}
  .ev .dot{margin-left:auto;width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
</style>
</head>
<body>
  <div class="ring r1"></div><div class="ring r2"></div>

  <div class="left">
    <div class="lockup">
      <div class="tile">
        <svg viewBox="0 0 24 24"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9a7bff"/><stop offset="1" stop-color="#6a49ef"/></linearGradient></defs><path d="M12 0C13 8 16 11 24 12C16 13 13 16 12 24C11 16 8 13 0 12C8 11 11 8 12 0Z" fill="url(#g)"/></svg>
      </div>
      <div class="word">Plan4U</div>
    </div>
    <div class="eyebrow">Calendar · tasks · people</div>
    <h1>Your whole day — in one <span class="em">beautiful</span> calendar.</h1>
    <div class="badge"><svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M16.4 12.9c0-2.6 2.1-3.8 2.2-3.9-1.2-1.8-3.1-2-3.8-2-1.6-.2-3.1.9-3.9.9s-2.1-.9-3.4-.9C4 7 2.3 8.5 2.3 11.4c0 2.9 2.3 6 3.4 7.6.9 1.4 1.9 2.9 3.2 2.9 1.3-.1 1.8-.9 3.3-.9s2 .9 3.4.9c1.4 0 2.3-1.4 3.2-2.8.6-.9.9-1.4 1.4-2.4-3.6-1.4-3.2-6.2-3.2-6.3zM14 5.2c.7-.9 1.2-2.1 1-3.2-1 .1-2.3.7-3 1.6-.6.8-1.2 2-1 3.1 1.2.1 2.3-.6 3-1.5z"/></svg><span><small>Download on the</small><b>App&nbsp;Store</b></span></div>
  </div>

  <div class="right">
    <div class="card">
      <div class="ctop"><div class="cmonth">June <em>28</em></div><div class="cava">A</div></div>
      <div class="today">TODAY · SUNDAY</div>
      <div class="ev" style="background:var(--lav-w)"><div class="bar" style="background:var(--lav)"></div><div><div class="t">Design review</div><div class="m">09:00 – 10:00</div></div><div class="dot" style="background:#fff">🚩</div></div>
      <div class="ev" style="background:var(--blue-w)"><div class="bar" style="background:var(--blue)"></div><div><div class="t">Team call</div><div class="m">11:00 – 11:30</div></div><div class="dot" style="background:#fff">💬</div></div>
      <div class="ev" style="background:var(--peach-w)"><div class="bar" style="background:var(--peach)"></div><div><div class="t">Lunch with Anna</div><div class="m">13:00 – 14:00</div></div><div class="dot" style="background:#fff">🥗</div></div>
    </div>
  </div>
</body>
</html>
